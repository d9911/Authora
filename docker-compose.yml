# Authora — Docker Compose
#
#   make docker-up      -> backend + frontend on SQLite (no DB container needed)
#   make db-mongo-up    -> backend + frontend on MongoDB (starts the mongo service)
#   make db-postgres-up -> starts the postgres service (Sequelize repos — WIP)
#
# DB configuration is set explicitly via `environment` (which takes precedence
# over env_file), so a local backend/.env used for `make dev` can never leak
# wrong DB host/credentials into the container.
services:
  backend:
    build: ./backend
    ports:
      - "3010:3010"
    # Secrets (SMTP / OAuth / Telegram) can come from the local backend/.env
    # during development, while backend/.env.docker can override them for Docker.
    # DB settings below stay literal because `environment` overrides env_file.
    env_file:
      - path: ./backend/.env
        required: false
      - path: ./backend/.env.docker
        required: false
    # Literal DB values so nothing (shell, .env) can shadow them. The default
    # compose stack runs on SQLite; the mongo override flips these.
    environment:
      NODE_ENV: production
      BACKEND_PORT: "3010"
      DB_TYPE: "sqlite"
      SQLITE_FILE: /data/authora.sqlite
      MONGO_URI: "mongodb://mongo:27017/authora"
      JWT_ACCESS_SECRET: "docker_access_secret_change_me"
      JWT_REFRESH_SECRET: "docker_refresh_secret_change_me"
      CORS_ORIGINS: "http://localhost:5178"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      # OAuth/Telegram secrets (GITHUB_*, TELEGRAM_BOT_TOKEN, TELEGRAM_BOT_URL,
      # FRONTEND_URL, SMTP_*) come from backend/.env or backend/.env.docker above.
      # They are intentionally NOT redeclared here so empty shell vars can't
      # shadow the file values (environment overrides env_file in Compose).
    volumes:
      - sqlite_data:/data
    healthcheck:
      # Probe /health over IPv4 using the built-in http module (robust across Node majors).
      test:
        ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3010/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    # on-failure (not unless-stopped) keeps Compose's dependency tracking stable:
    # a crashing container is not silently recreated with a new id mid-wait.
    restart: on-failure:3

  frontend:
    build: ./frontend
    ports:
      - "5178:5178"
    # Local frontend/.env is for `make dev`; in the container the proxy must point
    # at the backend service, so we set BACKEND_INTERNAL_URL literally here.
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:3010
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional databases — started only via their profiles.
  mongo:
    image: mongo:8
    profiles:
      - mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17.10.0
    profiles:
      - postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: authora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sqlite_data:
  mongo_data:
  postgres_data:
